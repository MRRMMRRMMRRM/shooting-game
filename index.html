    font-size: 16px;
    font-weight: 600;
  }

    border: 1px solid #444;
    border-radius: 4px;
    cursor: crosshair;
    display: block;
    max-width: 100%;
  }
  #overlay {
    position: absolute;
    top: 50%;
    left: 50%;

    border-radius: 8px;

/* ─── ゲーム状態 ─── */
let stage = 0;
let state = 'title'; // title | playing | clear | over | boss
let player, enemies, blocks, beams, particles;
let slowTimer = 0; // スローモーション残りフレーム数
let slowClearFn = null; // スロー終了後に呼ぶ処理
let keys = {};
let mouseX = W/2, mouseY = H/2;
let timeLeft, timerInterval;
let animId;

/* ─── 効果音（Web Audio API） ─── */
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function playSound(type) {
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.connect(g);
  g.connect(audioCtx.destination);

  if(type === 'beam') {
    // ビーム発射：短い高音
    o.type = 'square';
    o.frequency.setValueAtTime(880, audioCtx.currentTime);
    o.frequency.exponentialRampToValueAtTime(440, audioCtx.currentTime + 0.08);
    g.gain.setValueAtTime(0.15, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.08);
    o.start(); o.stop(audioCtx.currentTime + 0.08);

  } else if(type === 'hit') {
    // 強敵ダメージ：短い鈍い音
    o.type = 'square';
    o.frequency.setValueAtTime(150, audioCtx.currentTime);
    o.frequency.exponentialRampToValueAtTime(80, audioCtx.currentTime + 0.12);
    g.gain.setValueAtTime(0.2, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.12);
    o.start(); o.stop(audioCtx.currentTime + 0.12);

  } else if(type === 'enemy') {
    // 敵撃破：爆発っぽいノイズ
    o.type = 'sawtooth';
    o.frequency.setValueAtTime(200, audioCtx.currentTime);
    o.frequency.exponentialRampToValueAtTime(40, audioCtx.currentTime + 0.3);
    g.gain.setValueAtTime(0.3, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
    o.start(); o.stop(audioCtx.currentTime + 0.3);

  } else if(type === 'block') {
    // ブロック破壊：低めのポン
    o.type = 'triangle';
    o.frequency.setValueAtTime(300, audioCtx.currentTime);
    o.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.15);
    g.gain.setValueAtTime(0.2, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.15);
    o.start(); o.stop(audioCtx.currentTime + 0.15);

  } else if(type === 'clear') {
    // ステージクリア：上昇音
    [523, 659, 784, 1046].forEach((freq, i) => {
      const oc = audioCtx.createOscillator();
      const gc = audioCtx.createGain();
      oc.connect(gc); gc.connect(audioCtx.destination);
      oc.type = 'sine';
      const t = audioCtx.currentTime + i * 0.12;
      oc.frequency.setValueAtTime(freq, t);
      gc.gain.setValueAtTime(0.25, t);
      gc.gain.exponentialRampToValueAtTime(0.001, t + 0.2);
      oc.start(t); oc.stop(t + 0.2);
    });
    return;

  } else if(type === 'gameover') {
    // ゲームオーバー：下降音
    o.type = 'sawtooth';
    o.frequency.setValueAtTime(440, audioCtx.currentTime);
    o.frequency.exponentialRampToValueAtTime(55, audioCtx.currentTime + 0.8);
    g.gain.setValueAtTime(0.25, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.8);
    o.start(); o.stop(audioCtx.currentTime + 0.8);
  }
}

/* ─── 定数 ─── */
const PLAYER_SPEED = 4;
const PLAYER_R     = 16;
const ENEMY_R      = 20;
const BEAM_SPEED   = 12;
const BEAM_LEN     = 28;
const BS = 40; // 外枠ブロックのサイズ（正方形）

/* ─── ボス定数 ─── */
const BOSS_STAGE    = 10;
const BOSS_R        = PLAYER_R * 5;
const BOSS_MAX_HP   = 100;
const BOSS_BASE_SPD = 0.8;
const SLOW_RATE     = 0.12; // スロー中の速度倍率
const SLOW_FRAMES   = 30;  // スロー継続フレーム数（約0.5秒）

function makeBoss() {
  return {
    x: W / 2, y: H / 2,
    vx: BOSS_BASE_SPD, vy: BOSS_BASE_SPD * 0.7,
    hp: BOSS_MAX_HP, maxHp: BOSS_MAX_HP,
    isBoss: true, alive: true,
  };
}

function bossSpeed(hp) {
  const t = 1 - hp / BOSS_MAX_HP;
  return BOSS_BASE_SPD + t * 3.2;
}

function spawnFromBoss(boss, count, spd) {
  const spawned = [];
  for(let i = 0; i < count; i++) {
    const angle = (Math.PI * 2 / count) * i + Math.random() * 0.5;
    const dist  = BOSS_R + ENEMY_R * 2;
    const hp    = Math.random() < 0.4 ? 3 : 1;
    spawned.push({
      x: boss.x + Math.cos(angle) * dist,
      y: boss.y + Math.sin(angle) * dist,
      vx: Math.cos(angle) * spd,
      vy: Math.sin(angle) * spd,
      hp, maxHp: hp,
    });
  }
  return spawned;
}

/* 外枠：消えるブロックを端に敷き詰める */
function makeBorderBlocks() {
  const out = [];
  const cols = Math.floor(W / BS);
  const rows = Math.floor(H / BS);
  for(let c=0; c<cols; c++) {
    out.push({x: c*BS, y: 0,          w: BS, h: BS, alive: true}); // 上辺
    out.push({x: c*BS, y: H-BS,       w: BS, h: BS, alive: true}); // 下辺
  }
  for(let r=1; r<rows-1; r++) {
    out.push({x: 0,    y: r*BS,       w: BS, h: BS, alive: true}); // 左辺
    out.push({x: W-BS, y: r*BS,       w: BS, h: BS, alive: true}); // 右辺
  }
  return out;
}

/* ─── 初期化 ─── */
const MIN_SPAWN_DIST = 180; // プレイヤーと敵の最低距離

function initStage(s) {
  const def = STAGES[s];
  player = { x: BS*2, y: BS*2, angle: 0 };

  /* 敵の初期位置をプレイヤーから一定距離離す */
  enemies = def.enemies.map(e => {
    const ne = {...e, hp: e.hp || 1, maxHp: e.hp || 1};
    let nx = ne.x, ny = ne.y;
    const dx = nx - player.x, dy = ny - player.y;
    const dist = Math.sqrt(dx*dx + dy*dy);
    if(dist < MIN_SPAWN_DIST) {
      const angle = Math.atan2(dy, dx);
      nx = player.x + Math.cos(angle) * MIN_SPAWN_DIST;
      ny = player.y + Math.sin(angle) * MIN_SPAWN_DIST;
      // 画面内に収める
      nx = Math.max(BS + ENEMY_R, Math.min(W - BS - ENEMY_R, nx));
      ny = Math.max(BS + ENEMY_R, Math.min(H - BS - ENEMY_R, ny));
    }
    return {...ne, x: nx, y: ny};
  });

  blocks  = [
    ...makeBorderBlocks(),
    ...def.blocks.map(b => ({...b, alive:true}))
  ];
  beams   = [];
  particles = [];
  hudStage.textContent = s + 1;
  updateHUD();
}

/* ─── ボスステージ初期化 ─── */
function initBossStage() {
  player  = { x: BS*2, y: H/2, angle: 0 };
  enemies = [ makeBoss() ];
  blocks  = makeBorderBlocks();
  beams   = [];
  particles = [];
  hudStage.textContent = 'BOSS';
  updateHUD();
}

function updateHUD() {
  hudEnemy.textContent = enemies.filter(e=>e.alive!==false).length;
}

  clearInterval(timerInterval);

canvas.addEventListener('mousemove', e => {
  const r = canvas.getBoundingClientRect();
  mouseX = (e.clientX - r.left) / scale;
  mouseY = (e.clientY - r.top)  / scale;
});
canvas.addEventListener('click', () => {
  if(state !== 'playing') return;
  fireBeam();
});

/* ─── タッチ操作（canvas下のコントロールパネル） ─── */
const isMobile = () => window.matchMedia('(pointer: coarse)').matches;
const controlsEl   = document.getElementById('controls');
const joystickBase = document.getElementById('joystick-base');
const joystickStick= document.getElementById('joystick-stick');
const shootBtn     = document.getElementById('shoot-btn');
const STICK_MAX = 40;

let joyActive = false, joyId = null;
let joyDx = 0, joyDy = 0;

function showJoystick() {
  if(isMobile()) {
    controlsEl.style.display = 'flex';
    document.getElementById('hint').style.display = 'none';
  }
}

/* ジョイスティック操作 */
joystickBase.addEventListener('touchstart', e => {
  e.preventDefault();
  const t = e.changedTouches[0];
  if(joyId !== null) return;
  joyId = t.identifier;
  joyActive = true;
  updateStick(t);
}, {passive: false});

joystickBase.addEventListener('touchmove', e => {
  e.preventDefault();
  for(const t of e.changedTouches) {
    if(t.identifier !== joyId) continue;
    updateStick(t);
  }
}, {passive: false});

joystickBase.addEventListener('touchend', e => {
  e.preventDefault();
  for(const t of e.changedTouches) {
    if(t.identifier !== joyId) continue;
    joyId = null; joyActive = false;
    joyDx = 0; joyDy = 0;
    joystickStick.style.transform = 'translate(-50%, -50%)';
  }
}, {passive: false});

function updateStick(t) {
  const r = joystickBase.getBoundingClientRect();
  const cx = r.left + r.width  / 2;
  const cy = r.top  + r.height / 2;
  const dx = t.clientX - cx;
  const dy = t.clientY - cy;
  const dist = Math.sqrt(dx*dx + dy*dy);
  const clamped = Math.min(dist, STICK_MAX);
  const angle = Math.atan2(dy, dx);
  joyDx = Math.cos(angle) * clamped / STICK_MAX;
  joyDy = Math.sin(angle) * clamped / STICK_MAX;
  const sx = 50 + joyDx * STICK_MAX;
  const sy = 50 + joyDy * STICK_MAX;
  joystickStick.style.transform = `translate(calc(${sx}% - 50%), calc(${sy}% - 50%))`;
  joystickStick.style.left = sx + '%';
  joystickStick.style.top  = sy + '%';
}

/* 発射ボタン：プレイヤーから最寄りの敵に向けて自動照準して発射 */
shootBtn.addEventListener('touchstart', e => {
  e.preventDefault();
  if(state !== 'playing') return;
  audioCtx.resume();
  // 生き残っている敵の中で最も近い敵に自動照準
  const alive = enemies.filter(en => en.alive !== false);
  if(alive.length > 0) {
    let target = alive[0];
    let minD = Infinity;
    for(const en of alive) {
      const d = (en.x-player.x)**2 + (en.y-player.y)**2;
      if(d < minD) { minD = d; target = en; }
    }
    mouseX = target.x;
    mouseY = target.y;
  }
  fireBeam();
}, {passive: false});

function fireBeam() {
  playSound('beam');
  const angle = Math.atan2(mouseY - player.y, mouseX - player.x);
  beams.push({
    x: player.x + Math.cos(angle)*(PLAYER_R+2),
    y: player.y + Math.sin(angle)*(PLAYER_R+2),
    vx: Math.cos(angle)*BEAM_SPEED,
    vy: Math.sin(angle)*BEAM_SPEED,
    angle,
    alive: true
  });
}

/* ─── 更新 ─── */
function update() {
  /* スローモーション処理 */
  if(state === 'slowing') {
    slowTimer--;
    // 残り時間の割合（1.0→0.0）
    const t = slowTimer / SLOW_FRAMES;
    // 前半は等速、後半にかけてスローになるイージング（t^3で急激に落ちる）
    const rate = SLOW_RATE + (1.0 - SLOW_RATE) * Math.pow(t, 3);
    for(const p of particles) {
      p.x += p.vx * rate;
      p.y += p.vy * rate;
      p.vx *= 0.92;
      p.vy *= 0.92;
      p.life -= p.decay * rate;
    }
    particles = particles.filter(p => p.life > 0);
    if(slowTimer <= 0) {
      slowClearFn && slowClearFn();
      slowClearFn = null;
    }
    return;
  }
  if(state !== 'playing') return;

  /* スロー中の速度倍率（playing中は1.0） */
  const timeScale = 1.0;

  /* プレイヤー移動（キーボード＋ジョイスティック） */
  const spd = PLAYER_SPEED;
  let moveX = 0, moveY = 0;
  if(keys['w']||keys['W']||keys['ArrowUp'])    moveY -= 1;
  if(keys['s']||keys['S']||keys['ArrowDown'])  moveY += 1;
  if(keys['a']||keys['A']||keys['ArrowLeft'])  moveX -= 1;
  if(keys['d']||keys['D']||keys['ArrowRight']) moveX += 1;
  if(joyActive) { moveX += joyDx; moveY += joyDy; }
  if(moveX !== 0 || moveY !== 0) {
    const len = Math.sqrt(moveX*moveX + moveY*moveY);
    player.x = Math.max(PLAYER_R, Math.min(W-PLAYER_R, player.x + (moveX/len)*spd));
    player.y = Math.max(PLAYER_R, Math.min(H-PLAYER_R, player.y + (moveY/len)*spd));
  }
  player.angle = Math.atan2(mouseY - player.y, mouseX - player.x);

  /* ブロックとのめり込み補正（プレイヤー） */
  for(const b of blocks) {
    if(!b.alive) continue;
    resolveCircleRect(player, PLAYER_R, b);
  }

  /* ビーム更新 */
  for(const beam of beams) {
    if(!beam.alive) continue;
    beam.x += beam.vx;
    beam.y += beam.vy;
    if(beam.x<0||beam.x>W||beam.y<0||beam.y>H) { beam.alive=false; continue; }

    /* ビームとブロック */
    for(const b of blocks) {
      if(!b.alive) continue;
      if(rectContains(b, beam.x, beam.y)) {
        b.alive = false;
        beam.alive = false;
        playSound('block');
        break;
      }
    }
    if(!beam.alive) continue;

    /* ビームと敵・ボス */
    for(const e of enemies) {
      if(e.alive===false) continue;
      const dx = beam.x - e.x, dy = beam.y - e.y;
      const r = e.isBoss ? BOSS_R : (e.maxHp > 1 ? ENEMY_R * 1.3 : ENEMY_R);
      if(dx*dx+dy*dy < r*r) {
        e.hp--;
        beam.alive = false;
        if(e.hp <= 0) {
          e.alive = false;
          playSound('enemy');
          // パーティクルエフェクト
          const col = e.isBoss ? '#ff6d00' : (e.maxHp > 1 ? '#aa00ff' : '#2979ff');
          const cnt = e.isBoss ? 20 : (e.maxHp > 1 ? 12 : 8);
          spawnParticles(e.x, e.y, col, cnt, e.isBoss ? 6 : 4);
        } else {
          playSound('hit');
          // ボスはHP5減るたびに敵を放出
          if(e.isBoss && e.hp % 5 === 0) {
            if(e.hp > 50) {
              // フェーズ1：1体放出（HP1かHP3）
              const sp = Math.random() < 0.4 ? 3 : 1;
              const spd = 2.5;
              const ang = Math.random() * Math.PI * 2;
              enemies.push({
                x: e.x + Math.cos(ang)*(BOSS_R + ENEMY_R*2),
                y: e.y + Math.sin(ang)*(BOSS_R + ENEMY_R*2),
                vx: Math.cos(ang)*spd, vy: Math.sin(ang)*spd,
                hp: sp, maxHp: sp,
              });
            } else {
              // フェーズ2：3〜5体を高速放出
              const count = 3 + Math.floor(Math.random() * 3);
              const spd   = 4 + Math.random() * 2;
              const spawned = spawnFromBoss(e, count, spd);
              for(const s of spawned) enemies.push(s);
            }
          }
        }
        break;
      }
    }
  }
  beams = beams.filter(b=>b.alive);

  /* 敵更新 */
  const toSpawn = [];
  for(const e of enemies) {
    if(e.alive===false) continue;

    // ボスは速度をHPに応じて動的に更新
    if(e.isBoss) {
      const spd = bossSpeed(e.hp);
      const cur = Math.sqrt(e.vx*e.vx + e.vy*e.vy);
      if(cur > 0) { e.vx = e.vx/cur*spd; e.vy = e.vy/cur*spd; }
    }

    e.x += e.vx;
    e.y += e.vy;

    /* ブロックバウンス */
    const er = e.isBoss ? BOSS_R : (e.maxHp > 1 ? ENEMY_R*1.3 : ENEMY_R);
    for(const b of blocks) {
      if(!b.alive) continue;
      bounceCircleRect(e, er, b);
    }

    /* 画面外チェック → ゲームオーバーではなく2倍スポーン */
    /* ボスは画面外に出たら反対側からワープして戻る */
    if(e.isBoss) {
      if(e.x < -BOSS_R)  e.x = W + BOSS_R;
      if(e.x > W+BOSS_R) e.x = -BOSS_R;
      if(e.y < -BOSS_R)  e.y = H + BOSS_R;
      if(e.y > H+BOSS_R) e.y = -BOSS_R;
    } else if(e.x < -ENEMY_R || e.x > W+ENEMY_R || e.y < -ENEMY_R || e.y > H+ENEMY_R) {
      e.alive = false;
      // 出た辺を判定してスポーン位置と侵入方向を決める
      for(let i = 0; i < 2; i++) {
        const spd = Math.sqrt(e.vx*e.vx + e.vy*e.vy);
        let sx, sy, svx, svy;
        // 出た辺に応じて反対側の辺からスポーン
        if(e.x < -ENEMY_R) {
          // 左から出た → 右辺からスポーン
          sx = W - BS - ENEMY_R;
          sy = BS + ENEMY_R + Math.random() * (H - BS*2 - ENEMY_R*2);
          const angle = Math.PI + (Math.random()-0.5) * 0.8;
          svx = Math.cos(angle) * spd;
          svy = Math.sin(angle) * spd;
        } else if(e.x > W+ENEMY_R) {
          // 右から出た → 左辺からスポーン
          sx = BS + ENEMY_R;
          sy = BS + ENEMY_R + Math.random() * (H - BS*2 - ENEMY_R*2);
          const angle = (Math.random()-0.5) * 0.8;
          svx = Math.cos(angle) * spd;
          svy = Math.sin(angle) * spd;
        } else if(e.y < -ENEMY_R) {
          // 上から出た → 下辺からスポーン
          sx = BS + ENEMY_R + Math.random() * (W - BS*2 - ENEMY_R*2);
          sy = H - BS - ENEMY_R;
          const angle = -Math.PI/2 + (Math.random()-0.5) * 0.8;
          svx = Math.cos(angle) * spd;
          svy = Math.sin(angle) * spd;
        } else {
          // 下から出た → 上辺からスポーン
          sx = BS + ENEMY_R + Math.random() * (W - BS*2 - ENEMY_R*2);
          sy = BS + ENEMY_R;
          const angle = Math.PI/2 + (Math.random()-0.5) * 0.8;
          svx = Math.cos(angle) * spd;
          svy = Math.sin(angle) * spd;
        }
        toSpawn.push({ x:sx, y:sy, vx:svx, vy:svy, hp:e.maxHp, maxHp:e.maxHp });
      }
      playSound('hit'); // スポーン警告音
      continue;
    }

    /* プレイヤーへの衝突チェック */
    const collR = e.isBoss ? BOSS_R : (e.maxHp > 1 ? ENEMY_R * 1.3 : ENEMY_R);
    const pdx = e.x - player.x, pdy = e.y - player.y;
    if(pdx*pdx+pdy*pdy < (collR+PLAYER_R)*(collR+PLAYER_R)) {
      triggerGameOver('やられた！');
      return;
    }
  }
  // スポーン分を追加
  for(const ne of toSpawn) enemies.push(ne);

  /* クリア判定 */
  if(enemies.every(e=>e.alive===false)) {
    clearInterval(timerInterval);
    state = 'slowing';
    slowTimer = SLOW_FRAMES;
    if(stage + 1 < STAGES.length) {
      slowClearFn = () => {
        stage++;
        initStage(stage);
        hudStage.textContent = stage + 1;
        playSound('clear');
        showOverlay('ステージクリア！', `次のステージへ進みます。\nステージ ${stage+1} 開始！`, 'ステージ ' + (stage+1));
        state = 'clear';
      };
    } else if(stage === STAGES.length - 1) {
      slowClearFn = () => {
        stage = BOSS_STAGE;
        initBossStage();
        playSound('clear');
        showOverlay('⚠️ ラスボス出現！', '全ステージを制覇した！\nしかし…最後の敵が待ち構えている！', 'ボスに挑む！');
        state = 'clear';
      };
    } else {
      slowClearFn = () => {
        playSound('clear');
        showOverlay('🎉 ゲームクリア！', 'ラスボスを倒した！\n完全制覇おめでとうございます！', 'もう一度遊ぶ');
        const shareArea = document.getElementById('shareArea');
        const shareX    = document.getElementById('shareX');
        const gameUrl   = location.href;
        const text = `ラスボスを倒して完全制覇しました！🎮💥 ブラウザで遊べる2Dシューティングゲーム、あなたも挑戦してみて！ #2Dシューティング #ゲーム制作`;
        shareX.href = `https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}&url=${encodeURIComponent(gameUrl)}`;
        shareArea.style.display = 'block';
        state = 'clear';
      };
    }
  }

  /* パーティクル更新（playing中） */
  for(const p of particles) {
    p.x += p.vx;
    p.y += p.vy;
    p.vx *= 0.92;
    p.vy *= 0.92;
    p.life -= p.decay;
  }
  particles = particles.filter(p => p.life > 0);

  updateHUD();
}

/* ─── 当たり判定ユーティリティ ─── */
function rectContains(b, x, y) {
  return x >= b.x && x <= b.x+b.w && y >= b.y && y <= b.y+b.h;
}

function resolveCircleRect(obj, r, b) {
  const cx = obj.x, cy = obj.y;
  const nx = Math.max(b.x, Math.min(cx, b.x+b.w));
  const ny = Math.max(b.y, Math.min(cy, b.y+b.h));
  const dx = cx-nx, dy = cy-ny;
  const dist = Math.sqrt(dx*dx+dy*dy);
  if(dist < r && dist > 0) {
    const push = (r-dist)/dist;
    obj.x += dx*push;
    obj.y += dy*push;
  }
}

function bounceCircleRect(e, r, b) {
  const cx = e.x, cy = e.y;
  const nx = Math.max(b.x, Math.min(cx, b.x+b.w));
  const ny = Math.max(b.y, Math.min(cy, b.y+b.h));
  const dx = cx-nx, dy = cy-ny;
  const dist = Math.sqrt(dx*dx+dy*dy);
  if(dist < r && dist > 0) {
    /* 押し出し */
    const push = (r-dist)/dist;
    e.x += dx*push;
    e.y += dy*push;
    /* 衝突前の位置でどちらの面に当たったか判定 */
    const prevX = cx - e.vx;
    const prevY = cy - e.vy;
    const wasOutsideX = prevX < b.x - r + 1 || prevX > b.x + b.w + r - 1;
    const wasOutsideY = prevY < b.y - r + 1 || prevY > b.y + b.h + r - 1;
    if(wasOutsideX && !wasOutsideY) {
      e.vx = -e.vx;
    } else if(wasOutsideY && !wasOutsideX) {
      e.vy = -e.vy;
    } else {
      /* 斜め衝突：めり込み量が大きい軸で反射 */
      const overlapX = r - Math.abs(dx);
      const overlapY = r - Math.abs(dy);
      if(overlapX < overlapY) e.vx = -e.vx;
      else e.vy = -e.vy;
    }
  }
}

/* ─── パーティクル ─── */
function spawnParticles(x, y, color, count, speed) {
  for(let i = 0; i < count; i++) {
    const angle = (Math.PI * 2 / count) * i + Math.random() * 0.3;
    const spd   = speed * (0.6 + Math.random() * 0.8);
    particles.push({
      x, y,
      vx: Math.cos(angle) * spd,
      vy: Math.sin(angle) * spd,
      r: 4 + Math.random() * 4,
      life: 1.0,   // 1.0 → 0.0 でフェードアウト
      decay: 0.04 + Math.random() * 0.03,
      color,
    });
  }
}

/* ─── 描画 ─── */
function draw() {
  ctx.clearRect(0,0,W,H);

  /* 背景 */
  ctx.fillStyle = '#f5f0e8';
  ctx.fillRect(0,0,W,H);

  /* ドットグリッド */
  ctx.fillStyle = '#ccc';
  for(let x=20;x<W;x+=30) for(let y=20;y<H;y+=30)
    ctx.fillRect(x,y,2,2);

  /* ブロック（外枠・通常すべて同じ見た目） */
  for(const b of blocks) {
    if(!b.alive) continue;
    ctx.fillStyle = '#6b4200';
    ctx.fillRect(b.x, b.y, b.w, b.h);
    ctx.strokeStyle = '#3d2600';
    ctx.lineWidth = 2;
    ctx.strokeRect(b.x, b.y, b.w, b.h);
    ctx.strokeStyle = 'rgba(255,255,255,0.15)';
    ctx.lineWidth = 1;
    for(let i=8; i<b.w; i+=14) {
      ctx.beginPath();
      ctx.moveTo(b.x+i, b.y+2);
      ctx.lineTo(b.x+i, b.y+b.h-2);
      ctx.stroke();
    }
  }

  /* ビーム */
  for(const beam of beams) {
    ctx.save();
    ctx.strokeStyle = '#ffd700';
    ctx.lineWidth = 4;
    ctx.shadowColor = '#ffec6e';
    ctx.shadowBlur = 8;
    ctx.beginPath();
    ctx.moveTo(beam.x - Math.cos(beam.angle)*BEAM_LEN,
               beam.y - Math.sin(beam.angle)*BEAM_LEN);
    ctx.lineTo(beam.x, beam.y);
    ctx.stroke();
    ctx.restore();
  }

  /* 敵・ボス */
  for(const e of enemies) {
    if(e.alive===false) continue;

    /* ─── ボス描画 ─── */
    if(e.isBoss) {
      const r = BOSS_R;
      const hpRatio = e.hp / BOSS_MAX_HP;
      // フェーズで色変化：HP高→深紅、HP低→黄
      const red   = 180 + Math.round((1-hpRatio)*75);
      const green = Math.round(hpRatio * 30);
      ctx.save();
      // 外輪（オーラ）
      ctx.strokeStyle = hpRatio > 0.5 ? 'rgba(180,0,255,0.5)' : 'rgba(255,80,0,0.6)';
      ctx.lineWidth = 6;
      ctx.beginPath(); ctx.arc(e.x, e.y, r+10, 0, Math.PI*2); ctx.stroke();
      // 本体
      ctx.fillStyle = `rgb(${red},${green},30)`;
      ctx.beginPath(); ctx.arc(e.x, e.y, r, 0, Math.PI*2); ctx.fill();
      // ハイライト
      ctx.fillStyle = 'rgba(255,255,255,0.15)';
      ctx.beginPath(); ctx.ellipse(e.x-r*0.3, e.y-r*0.3, r*0.35, r*0.25, -Math.PI/4, 0, Math.PI*2); ctx.fill();
      // 怒り目
      const eyeOff = r * 0.28, eyeR = r*0.18, pupilR = r*0.10;
      ctx.fillStyle = '#ff0'; 
      ctx.beginPath(); ctx.arc(e.x-eyeOff, e.y-eyeOff*0.4, eyeR, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(e.x+eyeOff, e.y-eyeOff*0.4, eyeR, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#000';
      ctx.beginPath(); ctx.arc(e.x-eyeOff, e.y-eyeOff*0.4, pupilR, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(e.x+eyeOff, e.y-eyeOff*0.4, pupilR, 0, Math.PI*2); ctx.fill();
      // HPバー
      const barW = r * 2, barH = 10;
      const barX = e.x - r, barY = e.y + r + 10;
      ctx.fillStyle = '#333';
      ctx.fillRect(barX, barY, barW, barH);
      ctx.fillStyle = hpRatio > 0.5 ? '#e53935' : '#ff9800';
      ctx.fillRect(barX, barY, barW * hpRatio, barH);
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 1;
      ctx.strokeRect(barX, barY, barW, barH);
      // HP数値
      ctx.fillStyle = '#fff';
      ctx.font = `bold ${Math.round(r*0.4)}px sans-serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(e.hp, e.x, e.y);
      // フェーズ表示
      ctx.font = 'bold 13px sans-serif';
      ctx.fillStyle = hpRatio > 0.5 ? '#cc80ff' : '#ff9800';
      ctx.fillText(hpRatio > 0.5 ? 'PHASE 1' : '⚠ PHASE 2', e.x, barY + barH + 14);
      ctx.restore();
      continue;
    }

    const isTough = e.maxHp > 1;
    const r = isTough ? ENEMY_R * 1.3 : ENEMY_R;

    // HP別カラー
    let bodyColor;
    if(!isTough) {
      bodyColor = '#2979ff'; // 通常：青
    } else if(e.hp === 3) {
      bodyColor = '#aa00ff'; // HP3：紫
    } else if(e.hp === 2) {
      bodyColor = '#ff6d00'; // HP2：オレンジ
    } else {
      bodyColor = '#ffea00'; // HP1：黄色（瀕死）
    }

    ctx.save();
    ctx.fillStyle = bodyColor;
    ctx.beginPath();
    ctx.arc(e.x, e.y, r, 0, Math.PI*2);
    ctx.fill();

    /* ハイライト */
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    ctx.beginPath();
    ctx.ellipse(e.x - r*0.3, e.y - r*0.3, r*0.35, r*0.25, -Math.PI/4, 0, Math.PI*2);
    ctx.fill();

    /* HP表示（強敵のみ） */
    if(isTough) {
      ctx.fillStyle = '#fff';
      ctx.font = `bold ${Math.round(r * 0.7)}px sans-serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(e.hp, e.x, e.y);
    }

    /* 目 */
    const eyeOff = r * 0.28;
    const eyeR   = r * 0.22;
    const pupilR = r * 0.12;
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(e.x - eyeOff, e.y - eyeOff*0.5, eyeR, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(e.x + eyeOff, e.y - eyeOff*0.5, eyeR, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#1a237e';
    ctx.beginPath(); ctx.arc(e.x - eyeOff, e.y - eyeOff*0.5, pupilR, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(e.x + eyeOff, e.y - eyeOff*0.5, pupilR, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  }

  /* プレイヤー（赤い丸＋向き表示） */
  ctx.save();
  ctx.translate(player.x, player.y);
  ctx.rotate(player.angle);
  /* 胴体 */
  ctx.fillStyle = '#e53935';
  ctx.beginPath();
  ctx.arc(0, 0, PLAYER_R, 0, Math.PI*2);
  ctx.fill();
  /* ハイライト */
  ctx.fillStyle = 'rgba(255,255,255,0.3)';
  ctx.beginPath();
  ctx.ellipse(-4,-5,6,4,-Math.PI/4,0,Math.PI*2);
  ctx.fill();
  /* 砲口 */
  ctx.fillStyle = '#b71c1c';
  ctx.fillRect(PLAYER_R-4, -4, 14, 8);
  ctx.restore();

  /* パーティクル */
  for(const p of particles) {
    ctx.save();
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r * p.life, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  }
}



/* ─── ゲームループ ─── */
function loop() {
  update();
  draw();
  animId = requestAnimationFrame(loop);
}

/* ─── オーバーレイ ─── */
function showOverlay(title, msg, btnLabel) {
  overlayTitle.textContent = title;
  overlayMsg.textContent   = msg;
  overlayBtn.textContent   = btnLabel;
  overlay.style.display    = 'block';
}

function hideOverlay() {
  overlay.style.display = 'none';
  document.getElementById('shareArea').style.display = 'none';
}

/* ─── イベント ─── */
overlayBtn.addEventListener('click', () => {
  audioCtx.resume();
  showJoystick();
  if(state === 'title') {
    stage = 0;
    initStage(stage);
    hideOverlay();
    state = 'playing';
    startTimer();
  } else if(state === 'over') {
    // ゲームオーバーになったステージからリトライ
    if(stage === BOSS_STAGE) {
      initBossStage();
    } else {
      initStage(stage);
    }
    hideOverlay();
    state = 'playing';
    startTimer();
  } else if(state === 'clear') {
    if(stage === BOSS_STAGE) {
      // ボスステージ開始
      hideOverlay();
      state = 'playing';
      startTimer();
    } else if(stage < STAGES.length) {
      hideOverlay();
      state = 'playing';
      startTimer();
    } else {
      stage = 0;
      initStage(stage);
      hideOverlay();
      state = 'playing';
      startTimer();
    }
  }
});

function triggerGameOver(reason) {
  state = 'over';
  clearInterval(timerInterval);
  playSound('gameover');
  showOverlay('ゲームオーバー', reason + '\nもう一度挑戦しよう！', 'リトライ');
}

/* ─── 起動 ─── */
initStage(0);
const startMsg = isMobile()
  ? '左タッチ：移動\n右タッチ：照準・離して発射\n敵（青）を全滅させよう！'
  : 'WASDで移動\nマウスで照準・クリックでビーム発射\n敵（青）を全滅させよう！';
showOverlay('SHOOTING360', startMsg, 'ゲームスタート');
state = 'title';
loop();
</script>
